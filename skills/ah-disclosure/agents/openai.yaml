interface:
  display_name: "A/H Disclosure Analysis"
  short_description: "Retrieve A/H company data and analyze disclosure filings"
  default_prompt: "Use $ah-disclosure to retrieve A/H company data or download, ingest, and analyze a specified annual report or prospectus with traceable evidence and verified calculations."

dependencies:
  tools:
    - type: "mcp"
      value: "ah_disclosure"
      description: "A/H structured company data, filing download, PDF ingest, evidence retrieval, calculation, and validation tools"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
