interface:
  display_name: "A/H 披露分析"
  short_description: "查询A/H股公司数据，并下载、解析、检索和勾稽分析披露文件"
  default_prompt: "使用 $ah-disclosure 查询A/H股公司数据，或下载、解析并分析指定公司的年报或招股书，返回可追溯证据和经过验证的计算。"

dependencies:
  tools:
    - type: "mcp"
      value: "ah_disclosure"
      description: "A/H structured company data, filing download, PDF ingest, evidence retrieval, calculation, and validation tools"
      transport: "stdio"

policy:
  allow_implicit_invocation: true
